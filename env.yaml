name: WGBS_tools
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.10
  - bismark>=0.24.0
  - bowtie2>=2.4.0
  - samtools>=1.15
  - fastqc>=0.12.0
  - fastp>=0.23.0
  - scipy>=1.9.0
  - pandas>=1.5.0
  - numpy>=1.23.0
  - pyyaml>=6.0
  - parallel
  - pip
  - pip:
    - -e .  # 安装了WGBS_tools本身
